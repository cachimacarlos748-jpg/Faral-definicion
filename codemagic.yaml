workflows:
  faral-ia-android:
    name: Faral IA Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Force Modern Kotlin and Gradle
        script: |
          # Usar comandos más simples y compatibles para evitar errores de sed en macOS/CodeMagic
          # Forzar versiones en gradle.properties
          printf "\nkotlin.code.style=official\nkotlin.languageVersion=1.8\nkotlin.apiVersion=1.8\n" >> android/gradle.properties
          
          # Forzar versión de Gradle en el wrapper usando una técnica más robusta
          echo "distributionBase=GRADLE_USER_HOME" > android/gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> android/gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> android/gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> android/gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.1-all.zip" >> android/gradle/wrapper/gradle-wrapper.properties
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter build APK
        script: |
          flutter build apk --release --no-pub
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - cachimacarlos748@gmail.com
